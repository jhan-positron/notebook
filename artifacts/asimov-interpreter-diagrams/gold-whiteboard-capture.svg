<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">GOLD spec whiteboard capture</title>
  <desc id="desc">A cleaned SVG capture of the whiteboard notes: GOLD spec, interpreter implementation, validation, mock software, and test metrics. The lower-right CPU and PCIe sketch is intentionally omitted.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f8ca5"/>
    </marker>
    <style>
      .bg { fill: #f6f4ec; }
      .ink { stroke: #202020; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .ink-thin { stroke: #202020; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .blue { stroke: #3f8ca5; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.6; }
      .box { fill: rgba(255,255,255,0.25); stroke: #202020; stroke-width: 2.2; rx: 10; }
      .soft { fill: #fffdf7; stroke: #d6d0bf; stroke-width: 1.5; rx: 14; opacity: 0.92; }
      .title { font: 700 48px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .section { font: 700 34px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .text { font: 28px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .small { font: 23px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .tiny { font: 19px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .label { font: 24px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .muted { fill: #555; }
      .bullet { fill: #202020; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>

  <!-- subtle whiteboard smudges -->
  <path class="blue" d="M1115 445 C1215 430, 1315 432, 1405 455"/>
  <path class="blue" d="M1115 500 C1225 487, 1320 495, 1400 515"/>
  <path class="blue" d="M1110 590 C1230 575, 1330 580, 1430 600"/>
  <path class="blue" d="M1050 455 L1050 815 L1370 815"/>
  <path class="blue" d="M1370 455 L1370 815"/>

  <!-- GOLD spec -->
  <text class="title" x="125" y="95">GOLD</text>
  <text class="section" x="210" y="150">spec</text>

  <circle class="bullet" cx="250" cy="202" r="4"/>
  <text class="text" x="280" y="212">Concept validated</text>

  <circle class="bullet" cx="250" cy="260" r="4"/>
  <text class="text" x="280" y="270">most / not all "ready"</text>

  <circle class="bullet" cx="250" cy="318" r="4"/>
  <text class="text" x="280" y="328">pick stable cmds</text>
  <path class="ink" d="M275 342 C335 352, 438 348, 515 340"/>

  <path class="ink-thin" marker-end="url(#arrow)" d="M565 272 C610 280, 620 318, 608 358"/>
  <text class="label" x="533" y="390">complete</text>

  <path class="ink" marker-end="url(#arrow)" d="M250 330 C140 325, 137 405, 155 485"/>
  <text class="small" x="93" y="365" transform="rotate(-66 93 365)">implement</text>

  <!-- Interpreter section -->
  <text class="section" x="170" y="498">Interpreter</text>
  <path class="ink" d="M155 560 L155 875"/>
  <text class="small" x="92" y="705" transform="rotate(-45 92 705)">functionality</text>

  <path class="ink-thin" marker-end="url(#arrow)" d="M205 672 C205 548, 237 520, 260 514"/>
  <circle class="bullet" cx="240" cy="545" r="4"/>
  <text class="text" x="275" y="552">primary function: dispatch</text>

  <circle class="bullet" cx="340" cy="590" r="4"/>
  <text class="text" x="375" y="598"><tspan font-weight="700">security</tspan>: validate</text>

  <circle class="bullet" cx="245" cy="640" r="4"/>
  <text class="text" x="278" y="648">divide &amp; distribute</text>
  <path class="ink" marker-end="url(#arrow)" d="M270 664 C380 675, 540 666, 650 662"/>
  <text class="small" x="340" y="705">threading</text>

  <text class="section" x="205" y="770">{</text>
  <circle class="bullet" cx="245" cy="760" r="4"/>
  <text class="text" x="282" y="768">DMA X</text>
  <path class="ink-thin" marker-end="url(#arrow)" d="M440 754 L505 754"/>
  <text class="text" x="535" y="768">Weight XMS</text>

  <circle class="bullet" cx="245" cy="840" r="4"/>
  <text class="text" x="280" y="846">PCIe</text>
  <path class="ink-thin" marker-end="url(#arrow)" d="M392 838 L455 838"/>
  <path class="ink-thin" d="M280 856 C332 862, 382 858, 420 852"/>

  <circle class="bullet" cx="245" cy="900" r="4"/>
  <text class="text" x="282" y="900">Progress Counter / flow ctrl</text>
  <text class="tiny" x="523" y="930">based</text>
  <path class="ink-thin" d="M520 885 C560 915, 615 884, 650 892"/>

  <path class="ink-thin" marker-end="url(#arrow)" d="M215 625 C188 700, 180 795, 220 864"/>
  <text class="small" x="205" y="895" transform="rotate(-28 205 895)">subset</text>

  <circle class="bullet" cx="255" cy="913" r="4"/>
  <text class="text" x="290" y="920">Host: GOLD receiver</text>

  <!-- Validation section -->
  <text class="section" x="770" y="160">Validation</text>
  <circle class="bullet" cx="748" cy="143" r="4"/>
  <circle class="bullet" cx="800" cy="210" r="4"/>
  <text class="text" x="835" y="220">Unit tests</text>

  <circle class="bullet" cx="770" cy="330" r="4"/>
  <text class="text" x="805" y="340">Formulas test</text>

  <circle class="bullet" cx="805" cy="388" r="4"/>
  <text class="text" x="840" y="398">read Asim</text>
  <text class="text" x="935" y="438">registers</text>
  <path class="ink-thin" d="M1030 368 L1030 455"/>
  <text class="small" x="1050" y="390">stable</text>
  <text class="small" x="1050" y="422">cmds</text>

  <path class="ink-thin" marker-end="url(#arrow)" d="M890 445 C850 500, 765 495, 790 405"/>
  <path class="ink-thin" marker-end="url(#arrow)" d="M900 462 C900 520, 900 550, 885 585"/>
  <text class="small" x="910" y="500">as GOLD</text>
  <text class="small" x="910" y="528">spec read</text>

  <circle class="bullet" cx="820" cy="610" r="4"/>
  <text class="text" x="855" y="620">Run full</text>
  <text class="text" x="875" y="662">transformer</text>

  <!-- Mock/SW section -->
  <circle class="bullet" cx="820" cy="760" r="4"/>
  <text class="section" x="855" y="770">Mock / SW</text>
  <path class="ink" d="M800 786 C900 792, 980 785, 1025 770"/>

  <path class="ink" d="M862 798 L862 910"/>
  <text class="tiny" x="808" y="865" transform="rotate(-68 808 865)">model</text>

  <text class="text" x="900" y="828">SAL</text>
  <text class="text" x="900" y="868">SPM</text>
  <text class="text" x="900" y="908">SVL</text>
  <text class="text" x="900" y="948">X-mem</text>
  <circle class="bullet" cx="885" cy="819" r="3.5"/>
  <circle class="bullet" cx="885" cy="859" r="3.5"/>
  <circle class="bullet" cx="885" cy="899" r="3.5"/>
  <circle class="bullet" cx="885" cy="939" r="3.5"/>

  <circle class="bullet" cx="825" cy="885" r="4"/>
  <text class="section" x="850" y="905">Validator</text>
  <path class="ink-thin" marker-end="url(#arrow)" d="M905 665 C875 710, 860 735, 862 760"/>

  <!-- Metrics section -->
  <circle class="bullet" cx="1250" cy="160" r="4"/>
  <text class="section" x="1280" y="170">Test metrics</text>

  <circle class="bullet" cx="1295" cy="255" r="4"/>
  <text class="text" x="1325" y="265">Correctness</text>

  <path class="ink-thin" marker-end="url(#arrow)" d="M1310 335 C1265 335, 1238 333, 1218 330"/>
  <text class="section" x="1285" y="340">X perf</text>
  <text class="small" x="1360" y="394">until</text>
  <text class="small" x="1365" y="432">pallet.</text>

  <!-- high-level feedback loop from metrics to stable commands -->
  <path class="ink-thin" stroke-dasharray="10 10" marker-end="url(#arrow)" d="M1220 285 C1045 195, 760 160, 530 295"/>
  <text class="tiny muted" x="985" y="206">feedback</text>

</svg>
