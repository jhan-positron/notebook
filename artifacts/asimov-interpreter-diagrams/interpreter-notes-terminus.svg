  <line class="margin" x1="175" y1="0" x2="175" y2="1650"/>

  <!-- top: GOLD spec to integrated commands -->
  <text class="title" x="95" y="145">GOLD</text>

  <circle class="bullet" cx="235" cy="185" r="3.5"/>
  <text class="section" x="260" y="197">spec</text>
  <path class="ink-thin" d="M260 215 C310 219, 350 217, 395 211"/>

  <path class="ink-thin" marker-end="url(#arrow)" d="M420 185 C485 177, 530 178, 570 178"/>
  <path class="ink-thin" stroke-dasharray="4 14" d="M575 178 C625 180, 665 180, 705 180"/>
  <path class="ink-thin" marker-end="url(#arrow)" d="M710 180 C760 179, 805 180, 842 180"/>

  <text class="section" x="852" y="197">spec</text>
  <path class="ink-thin" d="M852 215 C902 219, 944 217, 990 211"/>

  <rect class="box" x="365" y="285" width="380" height="76"/>
  <text class="section" x="390" y="338">Integrated Cmds</text>

  <path class="ink-thin" marker-end="url(#arrow)" d="M325 225 C350 258, 382 283, 397 293"/>
  <path class="ink-thin" marker-end="url(#arrow)" d="M550 190 C550 230, 550 260, 550 285"/>
  <path class="ink-thin" marker-end="url(#arrow)" d="M900 218 C850 255, 785 280, 730 296"/>
