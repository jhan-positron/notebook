  <circle class="bullet" cx="220" cy="720" r="3.5"/>
  <text class="text" x="250" y="730">Progress Counter based flow control</text>

  <circle class="bullet" cx="220" cy="775" r="3.5"/>
  <text class="text" x="252" y="784">Host Communication: recv GOLD, send logits</text>

  <circle class="bullet" cx="285" cy="820" r="3.5"/>
  <text class="text" x="312" y="828">PCIe</text>

  <!-- Validate section -->
  <text class="section" x="85" y="970">Validate</text>

  <circle class="bullet" cx="220" cy="1015" r="3.5"/>
  <text class="text" x="255" y="1025">Terminus based</text>

  <circle class="bullet" cx="295" cy="1060" r="3.5"/>
  <text class="text" x="325" y="1072">Integrated Cmds:</text>
  <text class="small" x="610" y="1072">register reads to verify</text>
  <path class="ink-thin" marker-end="url(#arrow)" d="M475 1085 C475 1118, 475 1138, 475 1155"/>
  <text class="small" x="495" y="1138">as more cmds integrated</text>

  <circle class="bullet" cx="305" cy="1175" r="3.5"/>
  <text class="text" x="335" y="1185">run full transformer</text>

  <circle class="bullet" cx="220" cy="1290" r="3.5"/>
  <text class="text" x="252" y="1300">Control-plane centric sw mock</text>

  <!-- Test metrics -->
  <circle class="bullet" cx="220" cy="1380" r="3.5"/>
  <text class="text" x="252" y="1390">Test metrics</text>

  <circle class="bullet" cx="250" cy="1435" r="3.5"/>
  <text class="text" x="285" y="1445">Correctness</text>

  <circle class="bullet" cx="250" cy="1500" r="3.5"/>
  <text class="text" x="285" y="1510">Perf, until Palladium</text>
