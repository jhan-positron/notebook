<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1650" role="img" aria-labelledby="title desc">
  <title id="title">Interpreter notes capture</title>
  <desc id="desc">A cleaned SVG capture of handwritten notes describing GOLD specs flowing into integrated commands, interpreter responsibilities, validation, control-plane mock software, and test metrics.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020"/>
    </marker>
    <style>
      .paper { fill: #f8f5ed; }
      .rule { stroke: #7db4d7; stroke-width: 1.6; opacity: 0.75; }
      .margin { stroke: #cf5c70; stroke-width: 1.7; opacity: 0.7; }
      .ink { stroke: #202020; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .ink-thin { stroke: #202020; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .box { fill: rgba(255,255,255,0.2); stroke: #202020; stroke-width: 2.6; rx: 4; }
      .title { font: 42px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .section { font: 31px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .text { font: 30px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .small { font: 24px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .tiny { font: 20px "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive; fill: #202020; }
      .bullet { fill: #202020; }
    </style>
  </defs>

  <rect class="paper" x="0" y="0" width="1100" height="1650"/>

