  <text class="section" x="105" y="485">Interpreter</text>

  <circle class="bullet" cx="220" cy="530" r="3.5"/>
  <text class="text" x="250" y="540">Dispatch cmds</text>

  <circle class="bullet" cx="220" cy="585" r="3.5"/>
  <text class="text" x="278" y="598">validate security</text>

  <circle class="bullet" cx="220" cy="640" r="3.5"/>
