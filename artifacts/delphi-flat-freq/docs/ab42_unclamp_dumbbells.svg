  </g>
  <g font-size="11" fill="#898781" text-anchor="middle">
    <text x="147" y="308">96</text><text x="280" y="308">98</text><text x="413" y="308">100</text><text x="546" y="308">102</text>
    <text x="346" y="326">decode tokens/s/user @ 8 users, capture window 896-1024 — each row = one fresh provisioning draw (4 clamped + 4 un-clamped interleaved blocks, toggled live on the same instance)</text>
  </g>
