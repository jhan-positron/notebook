  <g>
    <line x1="188" y1="253" x2="254" y2="253" stroke="#888780" stroke-width="2"/>
    <circle cx="188" cy="253" r="6" fill="#888780"/><circle cx="254" cy="253" r="6" fill="#1D9E75"/>
    <text x="178" y="257" font-size="12" fill="#52514e" text-anchor="end">96.61</text>
