<svg viewBox="0 0 680 360" width="680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ab42: five fresh provisioning draws, each with clamped and un-clamped decode means at 8 users; the un-clamped arm leads in every draw while draw levels scatter across 6.3 percent">
  <rect x="0" y="0" width="680" height="360" fill="#ffffff"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <g font-size="12" fill="#52514e">
    <circle cx="36" cy="18" r="5" fill="#888780"/>
    <text x="46" y="22">clamped (2.70 GHz, verified per block)</text>
    <circle cx="300" cy="18" r="5" fill="#1D9E75"/>
    <text x="310" y="22">un-clamped (3.90 GHz, verified per block)</text>
  </g>
  <g stroke="#e1e0d9" stroke-width="1">
