    <text x="621" y="103" font-size="11" fill="#898781" text-anchor="middle">+1.04%</text>
  </g>
  <g>
    <line x1="136" y1="163" x2="218" y2="163" stroke="#888780" stroke-width="2"/>
    <circle cx="136" cy="163" r="6" fill="#888780"/><circle cx="218" cy="163" r="6" fill="#1D9E75"/>
    <text x="126" y="167" font-size="12" fill="#52514e" text-anchor="end">95.84</text>
    <text x="228" y="167" font-size="12" fill="#1a1a1a">97.07  <tspan fill="#898781">+1.29%</tspan></text>
  </g>
  <g>
    <line x1="194" y1="208" x2="282" y2="208" stroke="#888780" stroke-width="2"/>
    <circle cx="194" cy="208" r="6" fill="#888780"/><circle cx="282" cy="208" r="6" fill="#1D9E75"/>
